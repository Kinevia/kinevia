<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback bêta-testeurs — Admin Kinévia</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Satoshi:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --teal: #38BDF8;
            --teal-dark: #0EA5E9;
            --teal-light: #E0F2FE;
            --ink: #0f172a;
            --ink-soft: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --surface: #f8fafc;
            --white: #ffffff;
            --amber: #f59e0b;
            --amber-light: #fef3c7;
            --green: #10b981;
            --green-light: #d1fae5;
            --red: #ef4444;
            --red-light: #fee2e2;
        }
        body {
            font-family: 'Satoshi', -apple-system, sans-serif;
            background: var(--surface);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ─── HEADER ─── */
        .top-bar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo {
            font-family: 'Satoshi', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--ink);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logo img { width: 24px; height: 24px; border-radius: 5px; }
        .logo .via { color: var(--teal); }
        .top-bar-right { display: flex; align-items: center; gap: 12px; }
        .top-bar-right a {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .top-bar-right a:hover { color: var(--ink); }
        .badge-admin {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: var(--teal-light);
            color: var(--teal-dark);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* ─── LAYOUT ─── */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 32px 80px;
        }

        /* ─── PAGE TITLE ─── */
        .page-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-title h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            color: var(--ink);
            letter-spacing: -0.02em;
        }
        .copy-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Satoshi', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-link-btn:hover { background: var(--teal-dark); }
        .copy-link-btn.copied { background: var(--green); }

        /* ─── STATS CARDS ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--ink);
            line-height: 1;
        }
        .stat-sub {
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .stat-card.primary { border-color: var(--teal); }
        .stat-card.primary .stat-value { color: var(--teal-dark); }

        /* ─── RECOMM BAR ─── */
        .recomm-bar-wrap {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            margin-bottom: 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .recomm-bar-title {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }
        .recomm-bar-items { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .recomm-item { display: flex; align-items: center; gap: 8px; }
        .recomm-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .recomm-dot.oui { background: var(--green); }
        .recomm-dot.non { background: var(--red); }
        .recomm-dot.peut-etre { background: var(--amber); }
        .recomm-item-label { font-size: 0.88rem; font-weight: 500; color: var(--ink-soft); }
        .recomm-bar {
            height: 10px;
            border-radius: 20px;
            background: var(--border);
            overflow: hidden;
            margin-top: 10px;
            display: flex;
            gap: 2px;
        }
        .recomm-bar-seg {
            height: 100%;
            transition: width 0.5s;
        }
        .recomm-bar-seg.oui { background: var(--green); }
        .recomm-bar-seg.non { background: var(--red); }
        .recomm-bar-seg.peut-etre { background: var(--amber); }

        /* ─── TABLE ─── */
        .responses-section { }
        .responses-title {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .responses-count {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--teal-dark);
            background: var(--teal-light);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .response-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            margin-bottom: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            transition: box-shadow 0.15s;
        }
        .response-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .response-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .response-date {
            font-size: 0.82rem;
            color: var(--muted);
        }
        .response-contact {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--ink-soft);
            background: var(--surface);
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .stars-display {
            display: flex;
            gap: 3px;
        }
        .star-filled { color: var(--amber); font-size: 1rem; }
        .star-empty { color: var(--border); font-size: 1rem; }
        .rating-pair {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rating-label-small {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .recomm-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .recomm-badge.oui { background: var(--green-light); color: var(--green); }
        .recomm-badge.non { background: var(--red-light); color: var(--red); }
        .recomm-badge.peut-etre { background: var(--amber-light); color: var(--amber); }

        .response-body { margin-top: 12px; }
        .response-field {
            margin-bottom: 12px;
        }
        .response-field:last-child { margin-bottom: 0; }
        .field-key {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 3px;
        }
        .field-val {
            font-size: 0.92rem;
            color: var(--ink-soft);
            line-height: 1.55;
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            white-space: pre-wrap;
        }

        /* ─── EMPTY / LOADING ─── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .top-bar { padding: 14px 20px; }
            .page-wrap { padding: 24px 16px 60px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="/" class="logo">
        <img src="/icons/icon-96.png" alt="Kinévia">Kiné<span class="via">via</span>
    </a>
    <div class="top-bar-right">
        <span class="badge-admin">Admin</span>
        <a href="/admin">← Dashboard admin</a>
    </div>
</div>

<div class="page-wrap">
    <div class="page-title">
        <h1>Feedback bêta-testeurs</h1>
        <button class="copy-link-btn" id="copy-btn" onclick="copyFeedbackLink()">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/>
            </svg>
            Copier le lien du formulaire
        </button>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Chargement…</div>
            <div class="stat-value">—</div>
        </div>
    </div>

    <!-- Recommandation bar -->
    <div class="recomm-bar-wrap" id="recomm-bar-section" style="display:none;">
        <div class="recomm-bar-title">Recommandation</div>
        <div class="recomm-bar" id="recomm-bar"></div>
        <div class="recomm-bar-items" id="recomm-items" style="margin-top:12px;"></div>
    </div>

    <!-- Responses list -->
    <div class="responses-section">
        <div class="responses-title">
            Réponses
            <span class="responses-count" id="responses-count">0</span>
        </div>
        <div id="responses-list">
            <div class="loading-state">
                <div class="spinner"></div>
                Chargement des réponses…
            </div>
        </div>
    </div>
</div>

<script>
    function renderStars(n, total = 5) {
        let html = '';
        for (let i = 1; i <= total; i++) {
            html += i <= n
                ? '<span class="star-filled">★</span>'
                : '<span class="star-empty">☆</span>';
        }
        return html;
    }

    function recommLabel(val) {
        if (val === 'oui') return '👍 Oui';
        if (val === 'non') return '👎 Non';
        return '🤔 Peut-être';
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function loadData() {
        try {
            const res = await fetch('/api/admin/feedback');
            if (res.status === 401 || res.status === 403) {
                document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:sans-serif;"><h2>Accès refusé</h2><p style="margin-top:12px;color:#64748b;">Cette page est réservée aux administrateurs Kinévia.</p><a href="/connexion" style="display:inline-block;margin-top:20px;color:#0EA5E9;">Se connecter →</a></div>';
                return;
            }
            const data = await res.json();
            renderStats(data.stats);
            renderResponses(data.responses);
        } catch (err) {
            document.getElementById('responses-list').innerHTML = '<div class="empty-state">Erreur de chargement. <a href="" onclick="location.reload()">Réessayer</a></div>';
        }
    }

    function renderStats(s) {
        if (!s) return;
        const total = parseInt(s.total) || 0;
        const avgNote = parseFloat(s.avg_note_globale) || 0;
        const avgFacilite = parseFloat(s.avg_facilite) || 0;

        document.getElementById('stats-grid').innerHTML = `
            <div class="stat-card primary">
                <div class="stat-label">Total réponses</div>
                <div class="stat-value">${total}</div>
                <div class="stat-sub">bêta-testeurs</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Note globale moy.</div>
                <div class="stat-value">${avgNote > 0 ? avgNote.toFixed(1) : '—'}</div>
                <div class="stat-sub">sur 5 étoiles</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Facilité moy.</div>
                <div class="stat-value">${avgFacilite > 0 ? avgFacilite.toFixed(1) : '—'}</div>
                <div class="stat-sub">sur 5 étoiles</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Recommandent</div>
                <div class="stat-value">${total > 0 ? Math.round((parseInt(s.recommande_oui) / total) * 100) : 0}%</div>
                <div class="stat-sub">${s.recommande_oui} oui / ${total} total</div>
            </div>
        `;

        // Recommandation bar
        const oui = parseInt(s.recommande_oui) || 0;
        const non = parseInt(s.recommande_non) || 0;
        const peutEtre = parseInt(s.recommande_peut_etre) || 0;
        const sum = oui + non + peutEtre;
        if (sum > 0) {
            document.getElementById('recomm-bar-section').style.display = 'block';
            const pOui = (oui / sum * 100).toFixed(1);
            const pNon = (non / sum * 100).toFixed(1);
            const pPE = (peutEtre / sum * 100).toFixed(1);
            document.getElementById('recomm-bar').innerHTML = `
                <div class="recomm-bar-seg oui" style="width:${pOui}%"></div>
                <div class="recomm-bar-seg peut-etre" style="width:${pPE}%"></div>
                <div class="recomm-bar-seg non" style="width:${pNon}%"></div>
            `;
            document.getElementById('recomm-items').innerHTML = `
                <div class="recomm-item"><div class="recomm-dot oui"></div><span class="recomm-item-label">Oui : ${oui} (${pOui}%)</span></div>
                <div class="recomm-item"><div class="recomm-dot peut-etre"></div><span class="recomm-item-label">Peut-être : ${peutEtre} (${pPE}%)</span></div>
                <div class="recomm-item"><div class="recomm-dot non"></div><span class="recomm-item-label">Non : ${non} (${pNon}%)</span></div>
            `;
        }
    }

    function renderResponses(rows) {
        document.getElementById('responses-count').textContent = rows.length;

        if (rows.length === 0) {
            document.getElementById('responses-list').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:2.5rem;margin-bottom:12px;">📭</div>
                    <div style="font-weight:600;color:var(--ink-soft);margin-bottom:6px;">Aucune réponse pour l'instant</div>
                    <div>Partagez le lien du formulaire avec vos bêta-testeurs !</div>
                </div>`;
            return;
        }

        const html = rows.map(r => `
            <div class="response-card">
                <div class="response-header">
                    <div class="response-meta">
                        <span class="response-date">${formatDate(r.submitted_at)}</span>
                        ${r.contact_nom_email ? `<span class="response-contact">${escapeHtml(r.contact_nom_email)}</span>` : ''}
                    </div>
                    <span class="recomm-badge ${r.recommandation}">${recommLabel(r.recommandation)}</span>
                </div>
                <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:14px;">
                    <div class="rating-pair">
                        <span class="rating-label-small">Global</span>
                        <div class="stars-display">${renderStars(r.note_globale)}</div>
                        <span style="font-size:0.88rem;font-weight:700;color:var(--ink);">${r.note_globale}/5</span>
                    </div>
                    <div class="rating-pair">
                        <span class="rating-label-small">Facilité</span>
                        <div class="stars-display">${renderStars(r.facilite_utilisation)}</div>
                        <span style="font-size:0.88rem;font-weight:700;color:var(--ink);">${r.facilite_utilisation}/5</span>
                    </div>
                </div>
                ${r.fonctionnalite_preferee ? `
                    <div class="response-field">
                        <div class="field-key">Fonctionnalité préférée</div>
                        <div class="field-val">${escapeHtml(r.fonctionnalite_preferee)}</div>
                    </div>` : ''}
                ${r.ameliorations ? `
                    <div class="response-field">
                        <div class="field-key">Ce qui manque / à améliorer</div>
                        <div class="field-val">${escapeHtml(r.ameliorations)}</div>
                    </div>` : ''}
            </div>
        `).join('');

        document.getElementById('responses-list').innerHTML = html;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function copyFeedbackLink() {
        const url = window.location.origin + '/feedback';
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.classList.add('copied');
            btn.textContent = '✓ Lien copié !';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = `<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg> Copier le lien du formulaire`;
            }, 2500);
        }).catch(() => {
            prompt('Copiez ce lien :', url);
        });
    }

    loadData();
</script>

</body>
</html>
